services:
  postgres:
    image: postgres:16
    container_name: lingroove-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lingroove
      POSTGRES_USER: lingroove
      POSTGRES_PASSWORD: lingroove
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
